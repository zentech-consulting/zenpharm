name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore api

      - name: Build
        run: dotnet build api --no-restore --configuration Release

      - name: Test
        run: dotnet test api/api.tests --no-build --configuration Release --verbosity normal

  admin:
    name: Admin Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: cd admin && npm ci

      - name: Type check & build
        run: cd admin && npm run build

  public:
    name: Public Frontend — Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: public/package-lock.json

      - name: Install dependencies
        run: cd public && npm ci

      - name: Type check & build
        run: cd public && npm run build
